# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install frontend dependencies
        run: npm ci
      - name: Install functions dependencies
        run: npm ci --prefix functions
      - name: Security gate (frontend prod deps)
        run: npm audit --omit=dev --audit-level=moderate
      - name: Security gate (functions prod deps)
        run: npm audit --omit=dev --audit-level=moderate --prefix functions
      - name: Build
        run: npm run build
        env:
          REACT_APP_ADMIN_EMAIL: ${{ secrets.REACT_APP_ADMIN_EMAIL }}
          REACT_APP_ADMIN_USERNAME: ${{ secrets.REACT_APP_ADMIN_USERNAME }}
          REACT_APP_ADMIN_EMAIL_2: ${{ secrets.REACT_APP_ADMIN_EMAIL_2 }}
          REACT_APP_ADMIN_USERNAME_2: ${{ secrets.REACT_APP_ADMIN_USERNAME_2 }}
          REACT_APP_WHATSAPP_NUMBER: ${{ secrets.REACT_APP_WHATSAPP_NUMBER }}
          REACT_APP_FACEBOOK_URL: ${{ secrets.REACT_APP_FACEBOOK_URL }}
          REACT_APP_INSTAGRAM_URL: ${{ secrets.REACT_APP_INSTAGRAM_URL }}
          REACT_APP_TWITTER_URL: ${{ secrets.REACT_APP_TWITTER_URL }}
      - name: Create Firebase Service Account Key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ROMANCE_RETREAT_XSAVLAB }}' > ${{ github.workspace }}/firebase-service-account.json
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Deploy to Firebase Hosting
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="${{ github.workspace }}/firebase-service-account.json"
          firebase deploy --only hosting --project romance-retreat-xsavlab
      - name: Clean up service account key
        run: rm ${{ github.workspace }}/firebase-service-account.json
        if: always()
